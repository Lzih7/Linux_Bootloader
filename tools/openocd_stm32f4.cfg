# OpenOCD configuration for STM32F401 with ST-Link
#
# Usage:
#   openocd -f tools/openocd_stm32f4.cfg
#
# Or with telnet/GDB server:
#   openocd -f tools/openocd_stm32f4.cfg -c "init" -c "reset halt"

# ST-Link configuration
source [find interface/stlink.cfg]

# Set transport to SWD (Serial Wire Debug)
transport select swd

# Target configuration
source [find target/stm32f4x.cfg]

# Set the target to STM32F401
set CPUTAPID 0
set WORKAREASIZE 0x4000

# Speed configuration
adapter speed 1000
adapter srst delay 100
adapter srst pulse_width 100

# Reset configuration
reset_config srst_only

# Initialize
init

# Halt on reset
reset halt

# Start GDB server on port 3333
gdb_port 3333

# Start telnet server on port 4444
telnet_port 4444
